<body>
<h1>Seed — Futsilina Tournament #1</h1>
<p>Opens admin.html → click "Seed QUEEN + PRINCESS" to write all data to Firestore.<br>
   Run once only. Tournament ID: <strong>futsilina-1</strong></p>

<button onclick="seedAll()">▶ Seed QUEEN + PRINCESS</button>
<button class="del" onclick="deleteTournament()">✕ Delete tournament</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, doc, setDoc, deleteDoc, serverTimestamp, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-rPlg0Oau16QcTjD20hDfkyveRSrD8I0",
  authDomain: "tournaments-33619.firebaseapp.com",
  projectId: "tournaments-33619",
  storageBucket: "tournaments-33619.firebasestorage.app",
  messagingSenderId: "409384565600",
  appId: "1:409384565600:web:61bd55676343d6035abc05"
};
const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const T_ID  = 'futsilina-1';

// ── helpers ─────────────────────────────────────────────────
const log = msg => {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
};
function g(gi, gn, a, b, court, si, time) {
  return { gi, gn, a, b, court, si, time, sa:'', sb:'', catId: gi <= 3 ? 'queen' : 'princess' };
}

// ── QUEEN data ───────────────────────────────────────────────
const QUEEN_GROUPS = [
  { name:'A', teams:['תום מוריאל',"נוי ביסמוץ'",'לואנה דפני','מעיין פלוטקין','אור לריה'] },
  { name:'B', teams:["מרג' אילי","אלה בצ'ינה",'טאיס ראקל','קלי עדי','ים ליהי'] },
  { name:'C', teams:['רוני ניצן','קורין אלבי','אלינור הילה','עדי דזורן','שירה אופיר'] },
  { name:'D', teams:['שירי גבריאל','עמית עלמה','ברנדה דנה','רביד ליאן'] }
];

// Pool schedule — exactly as shown in the flyer
const Q = (gi,gn,a,b,c,si,t) => ({gi,gn,a,b,court:c,si,time:t,sa:'',sb:'',catId:'queen'});
const QUEEN_SCHED = [
  // 08:30
  Q(0,'A',"נוי ביסמוץ'",'אור לריה',1,0,'08:30'),
  Q(1,'B',"אלה בצ'ינה",'ים ליהי',2,0,'08:30'),
  Q(2,'C','קורין אלבי','שירה אופיר',3,0,'08:30'),
  Q(3,'D','שירי גבריאל','ברנדה דנה',4,0,'08:30'),
  // 08:45
  Q(0,'A','לואנה דפני','מעיין פלוטקין',1,1,'08:45'),
  Q(1,'B','טאיס ראקל','קלי עדי',2,1,'08:45'),
  Q(2,'C','אלינור הילה','עדי דזורן',3,1,'08:45'),
  Q(3,'D','עמית עלמה','רביד ליאן',4,1,'08:45'),
  // 09:00
  Q(0,'A','תום מוריאל','אור לריה',1,2,'09:00'),
  Q(1,'B',"מרג' אילי",'ים ליהי',2,2,'09:00'),
  Q(2,'C','רוני ניצן','שירה אופיר',3,2,'09:00'),
  Q(3,'D','עמית עלמה','ברנדה דנה',4,2,'09:00'),
  // 09:15
  Q(0,'A',"נוי ביסמוץ'",'מעיין פלוטקין',1,3,'09:15'),
  Q(1,'B',"אלה בצ'ינה",'קלי עדי',2,3,'09:15'),
  Q(2,'C','קורין אלבי','עדי דזורן',3,3,'09:15'),
  Q(3,'D','שירי גבריאל','רביד ליאן',4,3,'09:15'),
  // 09:30
  Q(0,'A','תום מוריאל','לואנה דפני',1,4,'09:30'),
  Q(1,'B',"מרג' אילי",'טאיס ראקל',2,4,'09:30'),
  Q(2,'C','רוני ניצן','אלינור הילה',3,4,'09:30'),
  Q(3,'D','ברנדה דנה','רביד ליאן',4,4,'09:30'),
  // 09:45
  Q(0,'A','מעיין פלוטקין','אור לריה',1,5,'09:45'),
  Q(1,'B','קלי עדי','ים ליהי',2,5,'09:45'),
  Q(2,'C','עדי דזורן','שירה אופיר',3,5,'09:45'),
  Q(3,'D','שירי גבריאל','עמית עלמה',4,5,'09:45'),
  // 10:00 — D has no game
  Q(0,'A',"נוי ביסמוץ'",'לואנה דפני',1,6,'10:00'),
  Q(1,'B',"אלה בצ'ינה",'טאיס ראקל',2,6,'10:00'),
  Q(2,'C','קורין אלבי','אלינור הילה',3,6,'10:00'),
  // 10:15
  Q(0,'A','תום מוריאל','מעיין פלוטקין',1,7,'10:15'),
  Q(1,'B',"מרג' אילי",'קלי עדי',2,7,'10:15'),
  Q(2,'C','רוני ניצן','עדי דזורן',3,7,'10:15'),
  // 10:30
  Q(0,'A','לואנה דפני','אור לריה',1,8,'10:30'),
  Q(1,'B','טאיס ראקל','ים ליהי',2,8,'10:30'),
  Q(2,'C','אלינור הילה','שירה אופיר',3,8,'10:30'),
  // 10:45
  Q(0,'A','תום מוריאל',"נוי ביסמוץ'",1,9,'10:45'),
  Q(1,'B',"מרג' אילי","אלה בצ'ינה",2,9,'10:45'),
  Q(2,'C','רוני ניצן','קורין אלבי',3,9,'10:45'),
  // 3rd place (gi=-1 so it doesn't affect group standings)
  {gi:-1,gn:'',a:'SF Loser 1',b:'SF Loser 2',court:1,si:17,time:'12:40',sa:'',sb:'',catId:'queen',isThirdPlace:true},
];

// KO bracket — QUEEN:
//   advPerGroup=3: #1 gets BYE (skips R16), #2+#3 play R16
//   r0: 8 entries — 4 byes (C1,D1,A1,B1) interleaved with 4 real R16 games
//       Standard 2:1 ratio applies: QF game i feeds from r0[i*2] and r0[i*2+1]
//   r1: Quarterfinals — bye winner vs R16 winner
//   r2: Semifinals, r3: Final
const BYE = (seed,catId) =>
  ({isBye:true,a:seed,b:'',seedA:seed,sa:'',sb:'',catId,court:0,si:-2,time:''});
const QQ = (a,b,sA,sB,c,si,t) =>
  ({a,b,seedA:sA,seedB:sB,sa:'',sb:'',catId:'queen',court:c,si,time:t});
const qF = (a,b,c,si,t) => ({a,b,sa:'',sb:'',catId:'queen',court:c,si,time:t});
const QUEEN_KO = {
  r0: [  // Round of 16 — 8 entries: bye then real game (pairs feed into QF)
    BYE('C1','queen'),              // QF-0 'a': C1 bye
    QQ('A2','B3','A2','B3',1,10,'11:00'), // QF-0 'b': winner goes vs C1
    BYE('D1','queen'),              // QF-1 'a': D1 bye
    QQ('B2','A3','B2','A3',2,10,'11:00'), // QF-1 'b': winner goes vs D1
    BYE('A1','queen'),              // QF-2 'a': A1 bye
    QQ('C2','D3','C2','D3',1,11,'11:15'), // QF-2 'b': winner goes vs A1
    BYE('B1','queen'),              // QF-3 'a': B1 bye
    QQ('D2','C3','D2','C3',2,11,'11:15'), // QF-3 'b': winner goes vs B1
  ],
  r1: [  // Quarterfinals
    qF('C1','A2/B3 winner',1,12,'11:30'),
    qF('D1','B2/A3 winner',2,12,'11:30'),
    qF('A1','C2/D3 winner',1,13,'11:45'),
    qF('B1','D2/C3 winner',2,13,'11:45'),
  ],
  r2: [  // Semifinals
    qF('QF winner 1','QF winner 2',1,15,'12:00'),
    qF('QF winner 3','QF winner 4',1,16,'12:20'),
  ],
  r3: [  // Final
    qF('SF winner 1','SF winner 2',1,18,'13:00'),
  ],
};

// ── PRINCESS data ────────────────────────────────────────────
const PRINCESS_GROUPS = [
  { name:'A', teams:['עמית לירי','מאיה דקל','שירה נועה','דליה סוזן'] },
  { name:'B', teams:['אורטל עפרי','אליה שירי','מוריאל שירה','מאיה רוני'] }
];

// Princess plays on courts 4 and 5 (courts 1-4 are Queen's)
const P = (gi,gn,a,b,c,si,t) => ({gi,gn,a,b,court:c,si,time:t,sa:'',sb:'',catId:'princess'});
const PRINCESS_SCHED = [
  // 10:00-10:45 — single court (court 4)
  P(0,'A','דליה סוזן','מאיה דקל',4,0,'10:00'),
  P(1,'B','מוריאל שירה','אורטל עפרי',4,1,'10:15'),
  P(0,'A','שירה נועה','עמית לירי',4,2,'10:30'),
  P(1,'B','מאיה רוני','אליה שירי',4,3,'10:45'),
  // 11:00-11:45 — מגרש 3 הצטרף (מגרש 3 עבר מהמלכות), משתמשים ב-3+4
  P(0,'A','שירה נועה','מאיה דקל',4,4,'11:00'),
  P(1,'B','מוריאל שירה','אליה שירי',3,4,'11:00'),
  P(0,'A','דליה סוזן','עמית לירי',4,5,'11:15'),
  P(1,'B','מאיה רוני','אורטל עפרי',3,5,'11:15'),
  P(0,'A','דליה סוזן','שירה נועה',4,6,'11:30'),
  P(1,'B','אורטל עפרי','אליה שירי',3,6,'11:30'),
  P(0,'A','מאיה דקל','עמית לירי',4,7,'11:45'),
  P(1,'B','מאיה רוני','מוריאל שירה',3,7,'11:45'),
  // 3rd place
  {gi:-1,gn:'',a:'SF Loser 1',b:'SF Loser 2',court:3,si:12,time:'13:00',sa:'',sb:'',catId:'princess',isThirdPlace:true},
];

// KO — advPerGroup=4, 2 groups → 8 teams, seeds=[A1,A2,A3,A4,B1,B2,B3,B4]
// pairs: A1×B4, A2×B3, A3×B2, A4×B1
// Princess KO on courts 3+4 (court 3 freed from Queen pools at 11:00)
const PP = (a,b,sA,sB,c,si,t) =>
  ({a,b,seedA:sA,seedB:sB,sa:'',sb:'',catId:'princess',court:c,si,time:t});
const pF = (a,b,c,si,t) => ({a,b,sa:'',sb:'',catId:'princess',court:c,si,time:t});
const PRINCESS_KO = {
  r0: [  // Quarterfinals — all 8 teams play (no byes)
    PP('A1','B4','A1','B4',4,8,'12:00'),
    PP('A2','B3','A2','B3',3,8,'12:00'),
    PP('A3','B2','A3','B2',4,9,'12:20'),
    PP('A4','B1','A4','B1',3,9,'12:20'),
  ],
  r1: [  // Semifinals
    pF('QF winner 1','QF winner 2',4,11,'12:40'),
    pF('QF winner 3','QF winner 4',3,11,'12:40'),
  ],
  r2: [  // Final
    pF('SF winner 1','SF winner 2',4,13,'13:15'),
  ],
};

// ── Seed function ─────────────────────────────────────────────
async function seedAll() {
  document.getElementById('log').textContent = '';
  log('▶ Starting seed…');

  const meta = {
    name: "Futilina — Ranking Tournament #1",
    logoUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTua-2e5QLae_tSk5ivSdAS_jbkbMOQ0HF9tg&s',
    primaryColor:   '#E91E8C',   // Futilina hot-pink
    secondaryColor: '#FF4FA8',   // lighter pink accent
    adminPassword:  'level1',
    masterPassword: 'level2',
    // Sponsor logos — add/edit later via admin.html → Sponsors button
    sponsorLogos: [
      { url:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfpip0caBtQCKMfg460UKZyFY6wtVuVTopJg&s', alt:'TAFC Israel', imgStyle:'filter:brightness(0)' },
      { url:'https://www.metropolisatmetrotown.com/media/v1/402/2026/03/oakberry.png', alt:'Oak Berry' },
      { url:'https://ee5-files.s3-us-west-2.amazonaws.com/thumbnails/ripcurl-logo-3188-1591215156.jpg', alt:'Rip Curl' },
      { url:'https://play-lh.googleusercontent.com/qUTejaQG5DvMRmaCeekn9iIJLWH8ZJKogV6Nowvu259OvVNl0_wDcxptPYqBLaiAI5cndOyk9B8IyUtCpPJChA', alt:'Agia' },
      { url:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTua-2e5QLae_tSk5ivSdAS_jbkbMOQ0HF9tg&s', alt:'Futilina' },
    ],
    phase:          'tournament',
    regOpen:        false,
    showRegistered: false,
    paymentLink: '', paymentLinkLabel: '',
    paymentLink2: '', paymentLink2Label: '',
    regNote: '',
  };

  const categories = [
    {
      id: 'queen', name: 'QUEEN',
      cfg: { courts:4, gameDur:15, breakDur:0, numGroups:4, advPerGroup:3,
             pointsToWin:15, sets:1, pointsThirdSet:15, startTime:'08:30' }
    },
    {
      id: 'princess', name: 'PRINCESS',
      cfg: { courts:2, gameDur:15, breakDur:0, numGroups:2, advPerGroup:4,
             pointsToWin:15, sets:1, pointsThirdSet:15, startTime:'10:00' }
    }
  ];

  const state = {
    queen: {
      roster: QUEEN_GROUPS.flatMap(g => g.teams),
      groups: QUEEN_GROUPS,
      sched:  QUEEN_SCHED,
      ko:     QUEEN_KO,
    },
    princess: {
      roster: PRINCESS_GROUPS.flatMap(g => g.teams),
      groups: PRINCESS_GROUPS,
      sched:  PRINCESS_SCHED,
      ko:     PRINCESS_KO,
    }
  };

  log(`  Writing tournament "${T_ID}"…`);
  try {
    await setDoc(doc(db, 'tournaments', T_ID), {
      meta, categories, state,
      updatedAt: serverTimestamp()
    });
    log('✓ Done! Tournament written to Firestore.');
    log(`  URL: https://albealrod.github.io/tournaments/?t=${T_ID}`);
    log('  Admin password:   level1');
    log('  Manager password: level2');
  } catch(e) {
    log('✗ ERROR: ' + e.message);
    console.error(e);
  }
}

async function deleteTournament() {
  if (!confirm(`Delete tournament "${T_ID}"?`)) return;
  try {
    await deleteDoc(doc(db, 'tournaments', T_ID));
    log('✓ Deleted.');
  } catch(e) {
    log('✗ ERROR: ' + e.message);
  }
}

Object.assign(window, { seedAll, deleteTournament });
</script>
</body>
