const QUEEN_SCHED = [

  // 08:45

  Q(2,'C','עדי ודזורן','שירה ואופיר',3,5,'09:45'),

  {gi:-1,gn:'',a:'מפסידה חצי גמר 1',b:'מפסידה חצי גמר 2',court:1,si:17,time:'12:40',sa:'',sb:'',catId:'queen'},

// KO bracket — top 2 per group → 8 teams → QF / SF / Final

const QQ = (a,b,sA,sB,c,si,t,extra={}) =>
  ({a,b,seedA:sA,seedB:sB,sa:'',sb:'',catId:'queen',court:c,si,time:t,...extra});

  r0: [
    QQ('A1','D2','A1','D2',1,10,'11:00'),
    QQ('B1','C2','B1','C2',2,10,'11:00'),
    QQ('A2','D1','A2','D1',1,11,'11:15'),
    QQ('B2','C1','B2','C1',2,11,'11:15'),
  ],
  r1: [
    {a:'Winner of Quarterfinals 1',b:'Winner of Quarterfinals 2',sa:'',sb:'',catId:'queen',court:1,si:14,time:'12:00'},
    {a:'Winner of Quarterfinals 3',b:'Winner of Quarterfinals 4',sa:'',sb:'',catId:'queen',court:1,si:15,time:'12:20'},

};

// ── PRINCESS data ────────────────────────────────────────────
const PRINCESS_GROUPS = [

  { name:'B', teams:['אורטל ועפרי','אליה ושירי','מוריאל ושירה','מאיה ורוני'] }

// Princess plays on courts 4 and 5 (courts 1-4 are Queen's)
const P = (gi,gn,a,b,c,si,t) => ({gi,gn,a,b,court:c,si,time:t,sa:'',sb:'',catId:'princess'});
const PRINCESS_SCHED = [
  // 10:00-10:45 — single court (court 4)
  P(0,'A','דליה וסוזן','מאיה ודקל',4,0,'10:00'),
  P(1,'B','מוריאל ושירה','אורטל ועפרי',4,1,'10:15'),

  P(1,'B','מאיה ורוני','אליה ושירי',4,3,'10:45'),
  // 11:00-11:45 — two courts (4 and 5)
  P(0,'A','שירה ונועה','מאיה ודקל',4,4,'11:00'),
  P(1,'B','מוריאל ושירה','אליה ושירי',5,4,'11:00'),
  P(0,'A','דליה וסוזן','עמית ולירי',4,5,'11:15'),
  P(1,'B','מאיה ורוני','אורטל ועפרי',5,5,'11:15'),
  P(0,'A','דליה וסוזן','שירה ונועה',4,6,'11:30'),
  P(1,'B','אורטל ועפרי','אליה ושירי',5,6,'11:30'),
  P(0,'A','מאיה ודקל','עמית ולירי',4,7,'11:45'),
  P(1,'B','מאיה ורוני','מוריאל ושירה',5,7,'11:45'),
  // 3rd-place
  {gi:-1,gn:'',a:'מפסידה חצי גמר 1',b:'מפסידה חצי גמר 2',court:4,si:12,time:'13:00',sa:'',sb:'',catId:'princess'},
];

// KO — advPerGroup=4, 2 groups → 8 teams, seeds=[A1,A2,A3,A4,B1,B2,B3,B4]
// pairs: A1×B4, A2×B3, A3×B2, A4×B1
// Princess KO also on courts 4 and 5
const PP = (a,b,sA,sB,c,si,t) =>
  ({a,b,seedA:sA,seedB:sB,sa:'',sb:'',catId:'princess',court:c,si,time:t});
const PRINCESS_KO = {
  r0: [
    PP('A1','B4','A1','B4',4,8,'12:00'),
    PP('A2','B3','A2','B3',5,8,'12:00'),
    PP('A3','B2','A3','B2',4,9,'12:20'),
    PP('A4','B1','A4','B1',5,9,'12:20'),
  ],
  r1: [
    {a:'Winner of Quarterfinals 1',b:'Winner of Quarterfinals 2',sa:'',sb:'',catId:'princess',court:4,si:11,time:'12:40'},
    {a:'Winner of Quarterfinals 3',b:'Winner of Quarterfinals 4',sa:'',sb:'',catId:'princess',court:5,si:11,time:'12:40'},
  ],
  r2: [
    {a:'Winner of Semifinals 1',b:'Winner of Semifinals 2',sa:'',sb:'',catId:'princess',court:4,si:13,time:'13:15'},
  ],
};

// ── Seed function ─────────────────────────────────────────────
async function seedAll() {
  document.getElementById('log').textContent = '';
  log('▶ Starting seed…');

  const meta = {
    name: "פוצ'ילינה — טורניר דירוג #1",
    logoUrl: '',            // ← add logo URL here if desired
    primaryColor:   '#E91E8C',
    secondaryColor: '#1565C0',
    adminPassword:  'level1',
    masterPassword: 'level2',
    // Sponsor logos — replace URLs with actual hosted images
    sponsorLogos: [
      { url:'', alt:'TAFC Israel' },
      { url:'', alt:'Oak Berry' },
      { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Rip_Curl_logo.svg/320px-Rip_Curl_logo.svg.png', alt:'Rip Curl' },
      { url:'', alt:'Sponsor' },
      { url:'', alt:"Futilina" },
    ],
    phase:          'tournament',
    regOpen:        false,
    showRegistered: false,
    paymentLink: '', paymentLinkLabel: '',
    paymentLink2: '', paymentLink2Label: '',
    regNote: '',
  };

  const categories = [
    {
      id: 'queen', name: 'QUEEN',
      cfg: { courts:4, gameDur:15, breakDur:0, numGroups:4, advPerGroup:2,
             pointsToWin:15, sets:1, pointsThirdSet:15, startTime:'08:30' }
    },
    {
      id: 'princess', name: 'PRINCESS',
      cfg: { courts:2, gameDur:15, breakDur:0, numGroups:2, advPerGroup:4,
             pointsToWin:15, sets:1, pointsThirdSet:15, startTime:'10:00' }
    }
  ];

  const state = {
    queen: {
      roster: QUEEN_GROUPS.flatMap(g => g.teams),
      groups: QUEEN_GROUPS,
      sched:  QUEEN_SCHED,
      ko:     QUEEN_KO,
    },
    princess: {
      roster: PRINCESS_GROUPS.flatMap(g => g.teams),
      groups: PRINCESS_GROUPS,
      sched:  PRINCESS_SCHED,
      ko:     PRINCESS_KO,
    }
  };

  log(`  Writing tournament "${T_ID}"…`);
  try {
    await setDoc(doc(db, 'tournaments', T_ID), {
      meta, categories, state,
      updatedAt: serverTimestamp()
    });
    log('✓ Done! Tournament written to Firestore.');
    log(`  URL: https://albealrod.github.io/tournaments/?t=${T_ID}`);
    log('  Admin password:   level1');
    log('  Manager password: level2');
  } catch(e) {
    log('✗ ERROR: ' + e.message);
    console.error(e);
  }
}

async function deleteTournament() {
  if (!confirm(`Delete tournament "${T_ID}"?`)) return;
  try {
    await deleteDoc(doc(db, 'tournaments', T_ID));
    log('✓ Deleted.');
  } catch(e) {
    log('✗ ERROR: ' + e.message);
  }
}

Object.assign(window, { seedAll, deleteTournament });
</script>
